<!DOCTYPE html>
<html lang="sw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAA Gender & Counseling Support System</title>
    
    <!-- Mbinu ya kuficha maudhui wakati wa Print -->
    <style>
        @media print { body { display: none !important; } }
        
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --primary: #00d2ff;
        }

        /* Hali ya usalama (White-out) */
        .secure-mode {
            filter: brightness(100) !important;
            background: white !important;
            pointer-events: none !important;
        }

        body {
            background: linear-gradient(135deg, #061a3d 0%, #1e3c72 50%, #061a3d 100%);
            font-family: 'Poppins', sans-serif;
            color: white;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: filter 0.1s ease;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .hidden { display: none !important; }
    </style>

    <script>
        // 1. Mbinu ya White-out: Inafanya screen iwe nyeupe mtumiaji akigusa vitufe vya screenshot
        function activateSecurity() {
            document.body.classList.add('secure-mode');
        }

        function deactivateSecurity() {
            // Inarudisha screen baada ya sekunde chache
            setTimeout(() => {
                document.body.classList.remove('secure-mode');
            }, 1000);
        }

        // Wakati mtumiaji anabonyeza vitufe vya screenshot, simu hupoteza "focus" kwenye kivinjari
        window.addEventListener('blur', activateSecurity);
        window.addEventListener('focus', deactivateSecurity);

        // Kuzuia Right Click na Long Press kwenye simu
        document.addEventListener('contextmenu', e => e.preventDefault());

        // Kuzuia Shortcuts za PC (Ctrl+S, Ctrl+P, nk)
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && (e.key === 'p' || e.key === 's' || e.key === 'u')) {
                e.preventDefault();
                activateSecurity();
            }
        });
    </script>
</head>

<body>
    <!-- App yako hapa -->
    <div class="container" id="mainApp">
        <h2 style="text-align: center; color: var(--primary);">IAA SECURE SYSTEM</h2>
        <p style="font-size: 12px; text-align: center;">Maudhui haya yamelindwa. Ukijaribu kuscreenshot, kioo kitakuwa cheupe.</p>
        
        <hr style="opacity: 0.2; margin: 20px 0;">
        
        <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px;">
            <p><strong>Taarifa ya Siri:</strong> Maelezo haya hayawezi kuonekana kwenye picha ya screenshot (itakuwa nyeupe tupu).</p>
        </div>

        <button onclick="location.reload()" style="width: 100%; margin-top: 20px; padding: 10px; border-radius: 10px; border: none; background: var(--primary); font-weight: bold;">RUDISHA KIOO</button>
    </div>

    <script>
        // Ikiwa unataka kuzuia kabisa kwenye Android App (Webview), 
        // utahitaji kuongeza kodi hii kwenye upande wa Android Studio (Java/Kotlin):
        // getWindow().setFlags(WindowManager.LayoutParams.FLAG_SECURE, WindowManager.LayoutParams.FLAG_SECURE);
    </script>
</body>

</html>
